name: Dependency Review

# Scans dependency manifest changes on pull requests for known vulnerabilities
# and license problems before they can be merged.
on: [pull_request]

# Default to no permissions; grant the minimum per job.
permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write # Allows the action to post its summary comment.
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce a high-severity vulnerability. License
          # policing is left off: it false-positives on LGPL dev-only tooling
          # (e.g. PHPCompatibility), and production licenses are vetted at release.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
