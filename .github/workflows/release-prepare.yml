name: Prepare Release

# Optional helper for step 1 of the release flow. Run it (Actions tab, GitHub
# mobile app, or `gh workflow run` -- ideally from the develop branch) to open a
# Release PR into main that:
#   - syncs the readme `Stable tag` to the plugin header version, and
#   - drops a DRAFT changelog generated from git history into readme.txt +
#     README.md (plus an Upgrade Notice stub).
#
# IMPORTANT: the generated changelog is a raw draft of commit subjects. Rewrite it
# into a proper, human changelog (what the version actually delivers, in plain
# prose) in that PR BEFORE merging -- we do not ship raw commit messages.
#
# Merging the PR into main IS the release: it lands a "Release X.Y.Z" commit that
# triggers .github/workflows/release.yml, which tags the version, builds the zip,
# creates the GitHub Release, and deploys to the wordpress.org SVN repo. main is
# branch-protected, so only an authorized merge can publish.
#
# The plugin header `Version:` is the single source of truth. Bump it (and the
# matching AAFM_VERSION constant) on develop BEFORE running this.

on:
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Open release PR
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write        # push the release/* branch
      pull-requests: write   # open the PR
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0     # full history + tags for the changelog range
          persist-credentials: true

      - name: Sync version and generate the changelog
        run: python3 .github/scripts/prepare_release.py

      - name: Open the release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(grep -E '^\s*\*\s*Version:' agent-abilities-for-mcp.php | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)"
          if [ -z "$VERSION" ]; then echo "could not read version"; exit 1; fi
          BRANCH="release/$VERSION"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin. Delete it or bump the version first."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add readme.txt README.md
          git commit -m "Release $VERSION"
          git push -u origin "$BRANCH"

          {
            echo "Automated release prep for **v$VERSION**."
            echo
            echo "- readme \`Stable tag\` synced to $VERSION"
            echo "- **draft** changelog generated into readme.txt + README.md + Upgrade Notice"
            echo
            echo "**Rewrite the draft changelog into proper human prose before merging** -- we do not ship raw commit subjects."
            echo "Merging to main tags \`$VERSION\`, builds the zip, creates the GitHub Release, and deploys to the wordpress.org SVN repo. main is branch-protected, so only an authorized merge publishes."
            echo
            echo "### Draft changelog (humanize me)"
            echo
            cat .github/release-notes.md
          } > /tmp/pr-body.md

          gh pr create --base main --head "$BRANCH" \
            --title "Release $VERSION" \
            --body-file /tmp/pr-body.md
