version: 2
updates:
  # Keep the pinned GitHub Actions SHAs current (a supply-chain win).
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'ci'
    labels:
      - dependencies
    groups:
      github-actions:
        patterns: ['*']

  # Watch Composer dependencies. Production updates (the bundled adapter) are
  # surfaced individually so each is reviewed and re-vendored deliberately;
  # dev-tool minor/patch bumps are grouped.
  - package-ecosystem: composer
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: 'build'
      include: 'scope'
    labels:
      - dependencies
    groups:
      composer-dev:
        dependency-type: 'development'
        update-types: [minor, patch]
